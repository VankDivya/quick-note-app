<!DOCTYPE html>
<html>
<head>
    <title>Quick Notes</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="container">
        <h1>Quick Note App</h1>

        <form id="noteForm">
            <textarea name="note" id="note" placeholder="Write your note..."></textarea>
            <button type="submit">Save Note</button>
        </form>

        <h2>Saved Notes</h2>

        <div id="notes">
            {% for note in notes %}
                <div class="note">
                    {{ note[1] }}
                </div>
            {% endfor %}
        </div>
    </div>

<script>
document.getElementById('noteForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const formData = new FormData(this);

    await fetch('/add', {
        method: 'POST',
        body: formData
    });

    location.reload();
});
</script>

</body>
</html>
